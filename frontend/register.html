<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Slot Booking</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="auth-body">
    <main class="auth-wrap">
        <section class="auth-card">
            <h1>Create account</h1>
            <p>Register to start booking slots.</p>
            <form id="registerForm" class="form">
                <label for="registerName">Name</label>
                <input id="registerName" type="text" required placeholder="Your name">

                <label for="registerEmail">Email</label>
                <input id="registerEmail" type="email" required placeholder="you@example.com">

                <label for="registerPassword">Password</label>
                <input id="registerPassword" type="password" minlength="6" required placeholder="At least 6 characters">

                <button type="submit" class="btn">Register</button>
            </form>
            <p id="registerMessage" class="message"></p>
            <p class="auth-switch">Already a user? <a href="/login.html">Login</a></p>
        </section>
    </main>
    <script src="/js/script.js"></script>
</body>
</html>
